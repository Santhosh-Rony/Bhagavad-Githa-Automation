name: Bhagavad Gita Post

on:
  workflow_dispatch: 
  
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  post_gita_verse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch with token so we can push state changes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies (ffmpeg for video)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate Gita Content and Render Video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY: ${{ secrets.OPENROUTER_FALLBACK_API_KEY }}
          OPENROUTER_FALLBACK_API_KEY_1: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_1 }}
          OPENROUTER_FALLBACK_API_KEY_2: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_2 }}
          OPENROUTER_FALLBACK_API_KEY_3: ${{ secrets.OPENROUTER_FALLBACK_API_KEY_3 }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          python main.py

      - name: Commit and Push Video + State
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add output/ gita_state.json
          git commit -m "Auto: Bhagavad Gita post - $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push

      - name: Wait for GitHub Pages to Serve Video
        run: |
          VIDEO_URL=$(python -c 'import json; print(json.load(open("output/post_metadata.json"))["video_url"])')
          echo "Polling URL: $VIDEO_URL"
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$VIDEO_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Video is publicly available!"
              break
            fi
            sleep 10
          done

      - name: Publish to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
        run: |
          python publish_instagram.py

      - name: Clean Up Media Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          rm -f output/*.png output/*.mp4
          git add output/
          git commit -m "Auto-cleanup: remove published media" || echo "No files to clean up"
          git push
